<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Architect OS | Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 60px; background: #080808; border-left: 1px solid #111; display: flex; flex-direction: column; align-items: center; padding: 20px 0; }
        .main { flex: 1; display: flex; flex-direction: column; }
        .workspace { flex: 1; display: flex; overflow: hidden; }
        .chat { flex: 1.2; display: flex; flex-direction: column; background: #050505; border-left: 1px solid #111; }
        .preview { flex: 1; background: #000; padding: 20px; color: #4ade80; font-family: monospace; overflow-y: auto; white-space: pre-wrap; }
        #chatBox { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .input-zone { padding: 20px; border-top: 1px solid #111; }
        .input-bar { background: #0d0d0d; border: 1px solid #222; border-radius: 12px; display: flex; padding: 5px; }
        input { flex: 1; background: transparent; border: none; outline: none; color: #fff; padding: 10px; }
        .send-btn { width: 45px; height: 45px; background: #2563eb; border-radius: 10px; cursor: pointer; border: none; color: white; }
        .msg { padding: 12px; border-radius: 10px; max-width: 80%; font-size: 14px; line-height: 1.5; }
        .ai { background: #111; border: 1px solid #222; align-self: flex-start; }
        .user { background: #2563eb; align-self: flex-end; }
        .error { background: #450a0a; border: 1px solid #991b1b; color: #fca5a5; align-self: center; }
    </style>
</head>
<body>
    <div class="sidebar">
        <i class="fas fa-terminal text-blue-500 text-xl mb-6"></i>
        <i class="fas fa-code text-zinc-600"></i>
    </div>
    <div class="main">
        <div class="workspace">
            <div class="chat">
                <div id="chatBox">
                    <div class="msg ai">نظام Architect جاهز. ارفع الكود على Vercel ليعمل الإرسال.</div>
                </div>
                <div class="input-zone">
                    <div class="input-bar">
                        <input type="text" id="userInput" placeholder="اطلب برمجة أي شيء...">
                        <button id="sendBtn" class="send-btn"><i class="fas fa-bolt"></i></button>
                    </div>
                </div>
            </div>
            <div class="preview" id="codeOut">// الأكواد البرمجية ستظهر هنا...</div>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const codeOut = document.getElementById('codeOut');

        function addMessage(text, type) {
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            div.textContent = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
            return div;
        }

        async function handleSend() {
            const val = userInput.value.trim();
            if (!val) return;

            userInput.value = '';
            addMessage(val, 'user');
            const loadingMsg = addMessage('جاري المعالجة...', 'ai');

            try {
                // منع الإرسال إذا كان في المعاينة (Preview)
                if (window.location.hostname.includes('goog')) {
                    throw new Error("يجب فتح الرابط الحقيقي على Vercel.");
                }

                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages: [{ role: 'user', content: val }] })
                });

                if (!res.ok) throw new Error("فشل الاتصال بالسيرفر.");

                const data = await res.json();
                const content = data.choices[0].message.content;

                // استخراج الكود
                const match = content.match(/```[\s\S]*?\n([\s\S]*?)```/);
                if (match) {
                    codeOut.textContent = match[1].trim();
                    loadingMsg.textContent = 'تم تحديث الكود في النافذة الجانبية.';
                } else {
                    loadingMsg.textContent = content;
                }
            } catch (err) {
                loadingMsg.className = 'msg error';
                loadingMsg.textContent = `خطأ: ${err.message}`;
            }
        }

        sendBtn.onclick = handleSend;
        userInput.onkeydown = (e) => { if (e.key === 'Enter') handleSend(); };
    </script>
</body>
</html>
