<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Architect OS | Pro Run</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 64px; background: #080808; border-left: 1px solid #1a1a1a; display: flex; flex-direction: column; align-items: center; padding: 20px 0; gap: 25px; }
        .main-workspace { flex: 1; display: flex; flex-direction: column; }
        .panels { flex: 1; display: flex; overflow: hidden; }
        .chat-panel { flex: 1.2; display: flex; flex-direction: column; background: #050505; border-left: 1px solid #111; }
        #chatHistory { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
        .code-panel { flex: 1; background: #000; border-right: 1px solid #111; display: flex; flex-direction: column; overflow: hidden; }
        .code-header { height: 40px; padding: 0 15px; background: #080808; border-bottom: 1px solid #1a1a1a; display: flex; justify-content: space-between; align-items: center; }
        pre { flex: 1; margin: 0; padding: 20px; overflow: auto; font-family: monospace; color: #4ade80; }
        #livePreview { flex: 1; border: none; background: #fff; display: none; }
        .msg { max-width: 85%; padding: 12px 16px; border-radius: 12px; font-size: 14px; }
        .msg-ai { background: #111; border: 1px solid #222; align-self: flex-start; }
        .msg-user { background: #2563eb; align-self: flex-end; }
        .input-section { padding: 20px; border-top: 1px solid #111; }
        .input-container { background: #0d0d0d; border: 1px solid #222; border-radius: 12px; display: flex; padding: 4px; }
        input { flex: 1; background: transparent; border: none; outline: none; color: #fff; padding: 12px; }
        .send-btn { width: 42px; height: 42px; background: #2563eb; border-radius: 10px; cursor: pointer; border: none; color: white; }
        .run-btn { background: #22c55e; color: black; padding: 0 15px; height: 32px; border-radius: 6px; display: none; font-weight: bold; cursor: pointer; border: none; }
    </style>
</head>
<body>
    <div class="sidebar">
        <i class="fas fa-terminal text-blue-500 text-2xl"></i>
    </div>
    <main class="main-workspace">
        <div class="panels">
            <section class="chat-panel">
                <div id="chatHistory"><div class="msg msg-ai">النظام جاهز. اطلب برمجة واضغط Run للمعاينة.</div></div>
                <div class="input-section">
                    <div class="input-container">
                        <input type="text" id="userInput" placeholder="اطلب كود HTML...">
                        <button id="sendBtn" class="send-btn"><i class="fas fa-bolt"></i></button>
                    </div>
                </div>
            </section>
            <section class="code-panel">
                <div class="code-header">
                    <span class="text-xs text-zinc-500">// SOURCE_VIEW</span>
                    <button id="runBtn" class="run-btn">RUN <i class="fas fa-play ml-1"></i></button>
                </div>
                <pre id="codeDisplay">// الأكواد ستظهر هنا...</pre>
                <iframe id="livePreview"></iframe>
            </section>
        </div>
    </main>

    <script>
        const chatBox = document.getElementById('chatHistory');
        const inputField = document.getElementById('userInput');
        const codePanel = document.getElementById('codeDisplay');
        const submitBtn = document.getElementById('sendBtn');
        const runBtn = document.getElementById('runBtn');
        const livePreview = document.getElementById('livePreview');

        let isRunning = false;

        async function startProcessing() {
            const query = inputField.value.trim();
            if (!query) return;

            inputField.value = '';
            const uDiv = document.createElement('div'); uDiv.className = 'msg msg-user'; uDiv.textContent = query;
            chatBox.appendChild(uDiv);
            
            const aiDiv = document.createElement('div'); aiDiv.className = 'msg msg-ai'; aiDiv.textContent = 'جاري المعالجة...';
            chatBox.appendChild(aiDiv);

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages: [{ role: 'user', content: query }] })
                });
                const result = await response.json();
                const content = result.choices[0].message.content;
                const foundCode = content.match(/```[\w]*\n([\s\S]*?)```/);
                
                if (foundCode) {
                    codePanel.textContent = foundCode[1].trim();
                    aiDiv.textContent = "تم استلام الكود. اضغط زر RUN لتشغيله.";
                    runBtn.style.display = 'block';
                } else {
                    aiDiv.textContent = content;
                }
            } catch (err) {
                aiDiv.textContent = "خطأ في الاتصال. تأكد من Vercel.";
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        runBtn.onclick = function() {
            if (!isRunning) {
                livePreview.style.display = 'block';
                codePanel.style.display = 'none';
                livePreview.srcdoc = codePanel.textContent;
                runBtn.innerHTML = 'STOP <i class="fas fa-stop"></i>';
                runBtn.style.background = '#ef4444';
                isRunning = true;
            } else {
                livePreview.style.display = 'none';
                codePanel.style.display = 'block';
                runBtn.innerHTML = 'RUN <i class="fas fa-play"></i>';
                runBtn.style.background = '#22c55e';
                isRunning = false;
            }
        };

        submitBtn.onclick = startProcessing;
        inputField.onkeydown = (e) => { if (e.key === 'Enter') startProcessing(); };
    </script>
</body>
</html>
