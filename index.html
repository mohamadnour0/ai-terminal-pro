<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Terminal Pro</title>
    <style>
        body { background: #0a0a0a; color: #00ff41; font-family: 'Courier New', monospace; margin: 0; padding: 20px; height: 100vh; display: flex; flex-direction: column; box-sizing: border-box; }
        #console { flex-grow: 1; overflow-y: auto; border: 1px solid #333; padding: 15px; background: #000; margin-bottom: 10px; box-shadow: 0 0 15px rgba(0, 255, 65, 0.1); }
        #input-container { display: flex; border: 1px solid #333; padding: 10px; background: #000; }
        .prompt { color: #00ff41; font-weight: bold; margin-right: 10px; }
        input { flex-grow: 1; background: transparent; border: none; color: #fff; outline: none; font-size: 16px; font-family: inherit; width: 100%; }
        .ai-msg { color: #00d4ff; margin-bottom: 15px; white-space: pre-wrap; line-height: 1.5; border-left: 2px solid #00d4ff; padding-left: 10px; }
        .user-msg { color: #00ff41; margin-bottom: 5px; font-weight: bold; }
        .system-msg { color: #888; font-style: italic; font-size: 13px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div id="console">
        <div class="system-msg">System: AI Terminal v1.1.0 (Secure Mode)</div>
        <div class="ai-msg">Connected to Backend. Ready for your commands...</div>
    </div>
    <div id="input-container">
        <span class="prompt">admin@terminal:~$</span>
        <input type="text" id="cmdInput" autofocus placeholder="Type your message here...">
    </div>

    <script>
        const consoleDiv = document.getElementById('console');
        const input = document.getElementById('cmdInput');

        input.addEventListener('keypress', async (e) => {
            if (e.key === 'Enter' && input.value.trim() !== "") {
                const userText = input.value;
                appendMsg('user-msg', `> ${userText}`);
                input.value = "";

                // إضافة رسالة انتظار
                const loadingId = appendMsg('system-msg', 'AI is processing...');

                try {
                    // الاتصال بالموزع السري في Vercel
                    const response = await fetch('/api/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            "messages": [{"role": "user", "content": userText}]
                        })
                    });

                    const data = await response.json();
                    
                    // إزالة رسالة الانتظار
                    const loadingElement = document.getElementById(loadingId);
                    if (loadingElement) loadingElement.remove();

                    // التحقق من صحة الرد المستلم من السيرفر
                    if (data.choices && data.choices[0] && data.choices[0].message) {
                        appendMsg('ai-msg', data.choices[0].message.content);
                    } else if (data.error) {
                        appendMsg('ai-msg', 'Error from Server: ' + data.error);
                    } else {
                        appendMsg('ai-msg', 'Error: Unexpected response format.');
                        console.error('Invalid response:', data);
                    }
                } catch (err) {
                    const loadingElement = document.getElementById(loadingId);
                    if (loadingElement) loadingElement.remove();
                    appendMsg('ai-msg', 'Error: Connection to backend failed.');
                }
            }
        });

        function appendMsg(cls, txt) {
            const div = document.createElement('div');
            const id = 'msg-' + Math.random().toString(36).substr(2, 9);
            div.id = id;
            div.className = cls;
            div.innerText = txt;
            consoleDiv.appendChild(div);
            consoleDiv.scrollTop = consoleDiv.scrollHeight;
            return id;
        }
    </script>
</body>
</html>
