<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Architect OS | Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; padding: 20px; }
        #output { height: 400px; overflow-y: auto; border: 1px solid #333; padding: 10px; margin-bottom: 10px; }
        .user { color: #58a6ff; }
        .ai { color: #fff; }
        .error { color: #ff7b72; }
        input { background: #111; border: 1px solid #333; color: #fff; width: 80%; padding: 10px; outline: none; }
        button { background: #238636; color: white; padding: 10px 20px; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div id="output"><div>-- نظام التشغيل الموحد --</div></div>
    <input type="text" id="userInput" placeholder="اكتب طلبك هنا...">
    <button onclick="send()">إرسال</button>

    <script>
        async function send() {
            const input = document.getElementById('userInput');
            const out = document.getElementById('output');
            const text = input.value.trim();
            if(!text) return;

            out.innerHTML += `<div class="user">> ${text}</div>`;
            input.value = '';

            try {
                // ملاحظة: تأكد أن هذا المسار هو نفسه الموجود في ملفاتك (api/chat)
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages: [{ role: 'user', content: text }] })
                });

                const data = await res.json();

                if (res.ok) {
                    out.innerHTML += `<div class="ai">${data.choices[0].message.content}</div>`;
                } else {
                    // هنا سيظهر لنا الخطأ الحقيقي القادم من السيرفر
                    out.innerHTML += `<div class="error">خطأ من السيرفر: ${JSON.stringify(data)}</div>`;
                }
            } catch (err) {
                out.innerHTML += `<div class="error">فشل الاتصال: تأكد من تشغيل السيرفر</div>`;
            }
            out.scrollTop = out.scrollHeight;
        }
    </script>
</body>
</html>
