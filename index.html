<div id="setup" class="setup-screen">
    <h1 class="text-4xl font-bold mb-10 text-white">اختر موظفك الرقمي</h1>
    <div class="flex gap-6">
        <div class="agent-card" onclick="startApp('مبرمج تطبيقات', 'خبير بناء مواقع وألعاب')">
            <i class="fas fa-code text-4xl text-blue-500 mb-4"></i>
            <h3 class="text-xl font-bold">مهندس برمجيات</h3>
            <p class="text-zinc-500 text-sm mt-2">لبناء أي نظام أو تطبيق تطلبه.</p>
        </div>
        <div class="agent-card" onclick="startApp('خبير تداول', 'محلل أسواق ذهب وبوتات تداول')">
            <i class="fas fa-chart-line text-4xl text-green-500 mb-4"></i>
            <h3 class="text-xl font-bold">محلل تداول</h3>
            <p class="text-zinc-500 text-sm mt-2">لتحليل السوق وبناء استراتيجيات الربح.</p>
        </div>
    </div>
</div>

<div id="app" class="main-app">
    <section class="chat-panel">
        <div class="p-4 bg-zinc-950 border-b border-zinc-900 flex justify-between items-center">
            <span id="role-name" class="text-blue-500 text-xs font-bold tracking-widest">AGENT READY</span>
            <button id="run-btn" class="run-btn">RUN ENGINE</button>
        </div>
        <div id="chat-messages" class="flex flex-col"></div>
        <div class="input-area">
            <div class="flex bg-zinc-900 rounded-xl p-2">
                <input type="text" id="user-input" class="bg-transparent flex-1 outline-none px-3" placeholder="أعطِ الموظف مهمة...">
                <button onclick="send()" class="bg-blue-600 w-10 h-10 rounded-lg"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </section>

    <section class="code-panel">
        <pre id="code-view">// بانتظار الأكواد . . .</pre>
        <iframe id="live-view"></iframe>
    </section>
</div>

<script>
    let currentRole = "";
    const chat = document.getElementById('chat-messages');
    const code = document.getElementById('code-view');
    const live = document.getElementById('live-view');
    const runBtn = document.getElementById('run-btn');

    function startApp(role, desc) {
        currentRole = role;
        document.getElementById('setup').style.display = 'none';
        document.getElementById('app').style.display = 'grid';
        document.getElementById('role-name').innerText = role.toUpperCase();
        addMsg(`تم تفعيل بروتوكول ${role}. أنا الموظف الرقمي الخاص بك، كيف يمكنني إبهارك اليوم؟`, 'ai');
    }

    function addMsg(text, type) {
        const div = document.createElement('div');
        div.className = `bubble ${type}-msg`;
        div.innerText = text;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }

    async function send() {
        const inp = document.getElementById('user-input');
        const val = inp.value.trim();
        if(!val) return;
        inp.value = '';
        addMsg(val, 'user');
        
        const aiMsg = document.createElement('div');
        aiMsg.className = 'bubble ai-msg';
        aiMsg.innerText = 'جاري التفكير والتنفيذ...';
        chat.appendChild(aiMsg);

        try {
            const res = await fetch('/api/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    messages: [
                        {role: 'system', content: `أنت موظف بمهنة ${currentRole}. نفذ المهام بدقة عالية.`},
                        {role: 'user', content: val}
                    ]
                })
            });
            const data = await res.json();
            const reply = data.choices[0].message.content;
            const match = reply.match(/```[\s\S]*?\n([\s\S]*?)```/);
            
            if(match) {
                code.textContent = match[1].trim();
                aiMsg.innerText = "تم إنجاز الكود بنجاح. اضغط RUN للمعاينة.";
                runBtn.style.display = 'block';
            } else {
                aiMsg.innerText = reply;
            }
        } catch(e) {
            aiMsg.innerText = "خطأ: تأكد من رفع الموقع على Vercel.";
        }
    }

    runBtn.onclick = () => {
        if(live.style.display === 'none') {
            live.srcdoc = code.textContent;
            live.style.display = 'block';
            code.style.display = 'none';
            runBtn.innerText = 'STOP';
            runBtn.style.background = '#ef4444';
        } else {
            live.style.display = 'none';
            code.style.display = 'block';
            runBtn.innerText = 'RUN ENGINE';
            runBtn.style.background = '#10b981';
        }
    };
</script>
