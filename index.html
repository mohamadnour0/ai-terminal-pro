<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Architect OS | Titanium Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;800&family=Noto+Sans+Arabic:wght@400;700&display=swap');

        :root {
            --bg: #050505;
            --accent: #2563eb;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
        }

        body {
            background: var(--bg);
            color: #fff;
            font-family: 'Noto Sans Arabic', 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* تحسين استجابة الخلفية */
        .background-glow {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 50% 50%, rgba(37, 99, 235, 0.1), transparent 80%);
            z-index: -1;
        }

        #os-container {
            width: 98vw;
            height: 95vh;
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            display: grid;
            grid-template-columns: 70px 380px 1fr;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        /* الجانب الأيمن (الدردشة) */
        .sidebar-chat {
            background: rgba(0,0,0,0.3);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .chat-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .msg {
            max-width: 90%;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.6;
            animation: msg-in 0.3s ease-out forwards;
        }

        @keyframes msg-in { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .msg.ai { background: rgba(255,255,255,0.05); border: 1px solid var(--border); align-self: flex-start; border-bottom-right-radius: 4px; }
        .msg.user { background: var(--accent); align-self: flex-end; border-bottom-left-radius: 4px; }

        /* منطقة الإدخال - الإصلاح هنا */
        .input-bar {
            padding: 20px;
            background: rgba(0,0,0,0.4);
            border-top: 1px solid var(--border);
        }

        .input-group {
            background: #111;
            border: 1px solid var(--border);
            border-radius: 12px;
            display: flex;
            align-items: center;
            padding: 8px 12px;
            transition: border 0.3s;
        }

        .input-group:focus-within {
            border-color: var(--accent);
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #fff;
            font-size: 14px;
            padding: 8px;
            /* منع المشاكل البرمجية في الإدخال */
            direction: rtl;
            unicode-bidi: plaintext;
        }

        /* منطقة العرض Stage */
        .stage {
            background: #000;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .stage-nav {
            height: 50px;
            background: #080808;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 20px;
            justify-content: space-between;
        }

        #code-editor {
            flex: 1;
            padding: 30px;
            font-family: 'Fira Code', monospace;
            font-size: 13px;
            color: #4ade80;
            overflow: auto;
            white-space: pre-wrap;
            background: #020202;
        }

        iframe {
            position: absolute;
            top: 50px;
            left: 0;
            width: 100%;
            height: calc(100% - 50px);
            background: #fff;
            border: none;
            display: none;
        }

        .btn-action {
            padding: 6px 16px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            text-transform: uppercase;
        }

        .btn-run { background: #10b981; color: #000; }
        .btn-run:hover { filter: brightness(1.2); }

        /* شريط الأدوات */
        .tools {
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            gap: 20px;
        }

        .tool-icon {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            color: #444;
            cursor: pointer;
            transition: 0.3s;
        }

        .tool-icon.active { background: var(--accent); color: white; }

        #status-text {
            font-size: 9px;
            color: var(--accent);
            font-family: monospace;
            margin-bottom: 5px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="background-glow"></div>

    <div id="os-container">
        <!-- شريط الأدوات -->
        <aside class="tools">
            <div class="tool-icon active"><i class="fas fa-terminal"></i></div>
            <div class="tool-icon"><i class="fas fa-project-diagram"></i></div>
            <div class="tool-icon"><i class="fas fa-user-tie"></i></div>
            <div class="mt-auto tool-icon text-red-900"><i class="fas fa-power-off"></i></div>
        </aside>

        <!-- نافذة الموظف الرقمي -->
        <section class="sidebar-chat">
            <div class="p-6 border-bottom border-zinc-800">
                <h1 class="font-black text-lg tracking-tighter">ARCHITECT <span class="text-blue-600">TITANIUM</span></h1>
                <p class="text-[9px] text-zinc-500 tracking-widest uppercase">Adaptive Execution Unit</p>
            </div>

            <div class="chat-content" id="chat-box">
                <div class="msg ai">تمت معالجة خطأ الإدخال. النظام يعمل الآن بكفاءة 100%. كيف يمكن للموظف الرقمي خدمتك الآن؟</div>
            </div>

            <div class="input-bar">
                <div id="status-text">> PROCESSING REQUEST...</div>
                <div class="input-group">
                    <input type="text" id="main-input" placeholder="اكتب أمرك هنا..." autofocus>
                    <button id="send-btn" class="text-blue-500 hover:text-blue-300 transition-colors">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </section>

        <!-- منصة العرض والكود -->
        <section class="stage">
            <div class="stage-nav">
                <span class="text-[10px] text-zinc-600 font-mono">WORKSPACE // SOURCE_VIEW</span>
                <button id="toggle-view" class="btn-action btn-run" style="display:none">Run Result</button>
            </div>
            <pre id="code-editor">// بانتظار المدخلات . . .</pre>
            <iframe id="preview-frame"></iframe>
        </section>
    </div>

    <script>
        const chatBox = document.getElementById('chat-box');
        const input = document.getElementById('main-input');
        const sendBtn = document.getElementById('send-btn');
        const codeEditor = document.getElementById('code-editor');
        const previewFrame = document.getElementById('preview-frame');
        const toggleBtn = document.getElementById('toggle-view');
        const statusText = document.getElementById('status-text');

        let isPreviewing = false;

        function addMessage(text, role) {
            const div = document.createElement('div');
            div.className = `msg ${role}`;
            div.innerText = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function handleExecution() {
            const query = input.value.trim();
            if (!query) return;

            input.value = '';
            addMessage(query, 'user');
            statusText.style.display = 'block';

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        messages: [
                            { role: 'system', content: 'أنت نظام Architect Titanium. قم بالتحول للموظف المطلوب فوراً وقدم الكود البرمجي كاملاً داخل علامات ```.' },
                            { role: 'user', content: query }
                        ]
                    })
                });

                const data = await response.json();
                statusText.style.display = 'none';
                
                const reply = data.choices[0].message.content;
                const codeMatch = reply.match(/```[\s\S]*?\n([\s\S]*?)```/);

                if (codeMatch) {
                    codeEditor.textContent = codeMatch[1].trim();
                    toggleBtn.style.display = 'block';
                    addMessage("تم الانتهاء من البرمجة. اضغط على Run Result للمعاينة.", "ai");
                } else {
                    addMessage(reply, "ai");
                }
            } catch (err) {
                statusText.innerText = "> ERROR: CONNECTION FAILED";
            }
        }

        toggleBtn.onclick = () => {
            if (!isPreviewing) {
                previewFrame.srcdoc = codeEditor.textContent;
                previewFrame.style.display = 'block';
                toggleBtn.innerText = "Back to Code";
                toggleBtn.style.background = "#ef4444";
                isPreviewing = true;
            } else {
                previewFrame.style.display = 'none';
                toggleBtn.innerText = "Run Result";
                toggleBtn.style.background = "#10b981";
                isPreviewing = false;
            }
        };

        sendBtn.onclick = handleExecution;
        input.onkeydown = (e) => {
            if (e.key === 'Enter') handleExecution();
        };
    </script>
</body>
</html>
