<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Architect OS | Titanium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;800&family=Noto+Sans+Arabic:wght@400;700&display=swap');

        :root {
            --bg: #000000;
            --accent: #2563eb;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
        }

        body {
            background: var(--bg);
            color: #fff;
            font-family: 'Plus Jakarta Sans', 'Noto Sans Arabic', sans-serif;
            margin: 0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* تأثير الخلفية الديناميكية */
        .orb {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(37,99,235,0.15) 0%, transparent 70%);
            filter: blur(80px);
            z-index: -1;
            animation: move 20s infinite alternate;
        }

        @keyframes move { from { transform: translate(-20%, -20%); } to { transform: translate(20%, 20%); } }

        /* حاوية النظام الرئيسية */
        #os-container {
            width: 95vw;
            height: 90vh;
            background: var(--glass);
            backdrop-filter: blur(40px);
            border: 1px solid var(--border);
            border-radius: 40px;
            display: grid;
            grid-template-columns: 80px 350px 1fr;
            overflow: hidden;
            box-shadow: 0 50px 100px rgba(0,0,0,0.8);
            transition: all 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        /* شريط الأدوات العمودي */
        .sidebar-icons {
            background: rgba(0,0,0,0.2);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 0;
            gap: 25px;
        }

        .icon-btn {
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 15px;
            color: #555;
            transition: 0.3s;
            cursor: pointer;
        }

        .icon-btn.active, .icon-btn:hover {
            background: var(--accent);
            color: white;
            box-shadow: 0 0 20px rgba(37,99,235,0.4);
        }

        /* نافذة الموظف والدردشة */
        .chat-area {
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            background: rgba(0,0,0,0.1);
        }

        .chat-header {
            padding: 25px;
            border-bottom: 1px solid var(--border);
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* فقاعات الدردشة الأنيقة */
        .msg {
            padding: 14px 18px;
            border-radius: 20px;
            font-size: 13px;
            max-width: 85%;
            line-height: 1.6;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } }

        .ai { background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-bottom-right-radius: 4px; }
        .user { background: var(--accent); align-self: flex-end; border-bottom-left-radius: 4px; }

        /* منطقة الإدخال */
        .input-box {
            padding: 25px;
            background: rgba(0,0,0,0.2);
        }

        .input-wrapper {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 20px;
            display: flex;
            padding: 10px 15px;
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: white;
            padding: 5px 10px;
        }

        /* نافذة المعالجة والعرض */
        .stage-area {
            position: relative;
            background: #000;
            overflow: hidden;
        }

        .stage-header {
            padding: 15px 30px;
            background: rgba(255,255,255,0.02);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #code-display {
            padding: 40px;
            font-family: 'Fira Code', monospace;
            font-size: 14px;
            color: #60a5fa;
            line-height: 1.8;
            overflow: auto;
            height: calc(100% - 60px);
        }

        #live-frame {
            position: absolute;
            inset: 60px 0 0 0;
            width: 100%;
            height: calc(100% - 60px);
            background: white;
            border: none;
            display: none;
            animation: slideUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .btn-run {
            background: #10b981;
            color: black;
            font-weight: 800;
            font-size: 11px;
            padding: 8px 20px;
            border-radius: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: none;
            transition: 0.3s;
        }

        .btn-run:hover { transform: scale(1.05); box-shadow: 0 0 20px #10b981; }

        /* شاشة التحميل الذكية */
        #thinking {
            display: none;
            font-size: 10px;
            color: var(--accent);
            font-family: monospace;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div class="orb"></div>

    <main id="os-container">
        <aside class="sidebar-icons">
            <div class="icon-btn active"><i class="fas fa-th-large"></i></div>
            <div class="icon-btn"><i class="fas fa-users"></i></div>
            <div class="icon-btn"><i class="fas fa-code-branch"></i></div>
            <div class="mt-auto icon-btn text-red-500"><i class="fas fa-power-off"></i></div>
        </aside>

        <section class="chat-area">
            <div class="chat-header">
                <h2 class="text-xl font-extrabold tracking-tighter">ARCHITECT <span class="text-blue-500">OS</span></h2>
                <p class="text-[10px] text-zinc-500 uppercase tracking-widest mt-1">Titanium Engine v5.0</p>
            </div>
            
            <div id="messages">
                <div class="msg ai">أهلاً محمد. النظام جاهز تماماً. اختر التخصص الذي تريده أو أعطني أي مهمة وسأقوم ببرمجة النظام ليتحول إلى ذلك الموظف فوراً.</div>
            </div>

            <div class="input-box">
                <div id="thinking">> ARCHITECT IS ANALYZING...</div>
                <div class="input-wrapper">
                    <input type="text" id="user-input" placeholder="اطلب المستحيل . . .">
                    <button id="send-btn" class="text-blue-500"><i class="fas fa-bolt"></i></button>
                </div>
            </div>
        </section>

        <section class="stage-area">
            <div class="stage-header">
                <span class="text-[10px] font-mono text-zinc-600 uppercase">Process_Output // Stage_1</span>
                <button id="run-btn" class="btn-run">Run Engine</button>
            </div>
            <pre id="code-display">// بانتظار تنفيذ الأوامر . . .</pre>
            <iframe id="live-frame"></iframe>
        </section>
    </main>

    <script>
        const chat = document.getElementById('messages');
        const input = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const codeDisplay = document.getElementById('code-display');
        const runBtn = document.getElementById('run-btn');
        const liveFrame = document.getElementById('live-frame');
        const thinking = document.getElementById('thinking');

        let isPreview = false;

        function addMsg(text, type) {
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            div.innerText = text;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        async function execute() {
            const val = input.value.trim();
            if(!val) return;
            input.value = '';
            addMsg(val, 'user');
            
            thinking.style.display = 'block';
            
            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        messages: [
                            {role: 'system', content: 'أنت نظام Architect OS. مهمتك هي التحول إلى أي موظف يطلبه المستخدم وتنفيذ المهمة بأكواد برمجية كاملة واحترافية جداً.'},
                            {role: 'user', content: val}
                        ]
                    })
                });

                const data = await res.json();
                thinking.style.display = 'none';
                
                const content = data.choices[0].message.content;
                const match = content.match(/```[\s\S]*?\n([\s\S]*?)```/);

                if(match) {
                    codeDisplay.textContent = match[1].trim();
                    runBtn.style.display = 'block';
                    addMsg("الموظف الرقمي انتهى من المهمة. الأكواد جاهزة للتشغيل.", "ai");
                } else {
                    addMsg(content, "ai");
                    codeDisplay.textContent = content;
                }
            } catch(e) {
                thinking.innerText = "> CONNECTION_ERROR: CHECK VERCEL DEPLOYMENT.";
            }
        }

        runBtn.onclick = () => {
            if(!isPreview) {
                liveFrame.srcdoc = codeDisplay.textContent;
                liveFrame.style.display = 'block';
                runBtn.innerText = "Close Preview";
                runBtn.style.background = "#ef4444";
                isPreview = true;
            } else {
                liveFrame.style.display = 'none';
                runBtn.innerText = "Run Engine";
                runBtn.style.background = "#10b981";
                isPreview = false;
            }
        };

        sendBtn.onclick = execute;
        input.onkeydown = (e) => e.key === 'Enter' && execute();
    </script>
</body>
</html>
